name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'linux-brain-map-app/webapp/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: linux-brain-map-app
        run: bun install --frozen-lockfile

      - name: Build for GitHub Pages
        working-directory: linux-brain-map-app/webapp
        run: bun run build:pages

      - name: Add SPA fallback
        working-directory: linux-brain-map-app/webapp/dist
        run: cp index.html 404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: linux-brain-map-app/webapp/dist

      - id: deployment
        uses: actions/deploy-pages@v4